<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.4rem;
      color: #a8dadc;
      min-height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
    }

    #controls {
      margin-top: 1.6rem;
      display: flex;
      gap: 12px;
      flex-direction: column;
      align-items: center;
    }

    #mode-toggle {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 0.5rem 1.4rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover, button.active {
      background: #e94560;
      color: #fff;
    }

    #score {
      margin-top: 1rem;
      display: flex;
      gap: 28px;
      font-size: 1rem;
      color: #aaa;
    }

    .score-item span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <div id="mode-toggle">
      <button id="btn-2p" class="active" onclick="setMode('2p')">2 Players</button>
      <button id="btn-ai" onclick="setMode('ai')">vs AI</button>
    </div>
    <button onclick="resetGame()">New Game</button>
  </div>
  <div id="score">
    <div class="score-item">X: <span id="score-x">0</span></div>
    <div class="score-item">Draws: <span id="score-d">0</span></div>
    <div class="score-item">O: <span id="score-o">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, mode, scores;
    scores = { X: 0, O: 0, D: 0 };
    mode = '2p';

    function setMode(m) {
      mode = m;
      document.getElementById('btn-2p').classList.toggle('active', m === '2p');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      resetGame();
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      renderBoard();
      setStatus("X's turn");
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' ' + val.toLowerCase() + ' taken' : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        el.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (mode === 'ai' && current === 'O') return;
      makeMove(i);
    }

    function makeMove(i) {
      board[i] = current;
      renderBoard();
      const win = checkWin();
      if (win) {
        highlight(win);
        setStatus(`${current} wins!`);
        scores[current]++;
        updateScore();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScore();
        gameOver = true;
        return;
      }
      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
      if (mode === 'ai' && current === 'O' && !gameOver) {
        setTimeout(aiMove, 350);
      }
    }

    function aiMove() {
      const move = bestMove();
      if (move !== null) makeMove(move);
    }

    function bestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Block X
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          if (checkWin()) { board[i] = null; return i; }
          board[i] = null;
        }
      }
      // Take center
      if (!board[4]) return 4;
      // Take corner
      const corners = [0, 2, 6, 8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // Any open
      const open = board.map((v, i) => v ? null : i).filter(v => v !== null);
      return open.length ? open[Math.floor(Math.random() * open.length)] : null;
    }

    function checkWin() {
      return WINS.find(([a, b, c]) => board[a] && board[a] === board[b] && board[b] === board[c]) || null;
    }

    function highlight(combo) {
      const cells = document.getElementById('board').children;
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    resetGame();
  </script>
</body>
</html>
